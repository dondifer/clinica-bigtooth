// ── COMPONENTE: imagen con fade-in al cargar y al hacer scroll ──────────────
function FadeImg({src, alt, style, className=''}){
  const [loaded, setLoaded] = useState(false);
  const [inView, setInView] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current; if(!el) return;
    const obs = new IntersectionObserver(([e])=>{
      if(e.isIntersecting){ setInView(true); obs.disconnect(); }
    },{threshold:0.08});
    obs.observe(el);
    return ()=>obs.disconnect();
  },[]);
  const visible = loaded && inView;
  return (
    <img
      ref={ref}
      src={src}
      alt={alt}
      loading="lazy"
      onLoad={()=>setLoaded(true)}
      className={className}
      style={{
        ...style,
        opacity: visible ? 1 : 0,
        transform: visible ? 'scale(1)' : 'scale(1.04)',
        transition: 'opacity 800ms cubic-bezier(.16,1,.3,1), transform 1.2s cubic-bezier(.16,1,.3,1)',
      }}
    />
  );
}

// ── HOOKS ──────────────────────────────────────────────────────────────────
function useIsMobile(){
  const [v,setV]=useState(()=>window.matchMedia('(max-width:767px)').matches);
  useEffect(()=>{
    const mq=window.matchMedia('(max-width:767px)');
    const h=e=>setV(e.matches);
    mq.addEventListener('change',h);
    return()=>mq.removeEventListener('change',h);
  },[]);
  return v;
}
function useReveal(t=0.08){
  const ref=useRef(null);
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.disconnect();}},{threshold:t});
    obs.observe(el);
    return()=>obs.disconnect();
  },[t]);
  const anim=useCallback(i=>({
    opacity:vis?1:0,
    transform:vis?'translateY(0)':'translateY(28px)',
    transition:`opacity .7s cubic-bezier(.16,1,.3,1) ${i*120}ms,transform .7s cubic-bezier(.16,1,.3,1) ${i*120}ms`,
  }),[vis]);
  return{ref,anim};
}

// ── SPLASH ──────────────────────────────────────────────────────────────────
function Splash({onDone}){
  const [n,setN]=useState(0);
  const [out,setOut]=useState(false);
  useEffect(()=>{
    let s=0;
    const iv=setInterval(()=>{
      s++;setN(s);
      if(s>=100){clearInterval(iv);setTimeout(()=>{setOut(true);setTimeout(onDone,700);},200);}
    },20);
    return()=>clearInterval(iv);
  },[onDone]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:100,background:'var(--slate)',display:'flex',alignItems:'flex-end',justifyContent:'flex-start',opacity:out?0:1,transition:'opacity 700ms ease',pointerEvents:out?'none':'auto'}}>

}

function Contacto(){
  const isMobile=useIsMobile();
  const rev=useReveal();
  const [sent,setSent]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const [form,setForm]=useState({nombre:'',telefono:'',email:'',tratamiento:'Implantes dentales',mensaje:''});

  const CRM_URL = 'https://clinica-bigtooth-crm.netlify.app/api/citas';

  const handleSubmit = async (e) => {
    e.preventDefault();
    setErr('');
    setLoading(true);
    try {
      const res = await fetch(CRM_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({...form, origen:'web'})
      });
      if (!res.ok) throw new Error('Error al enviar');
      setSent(true);
    } catch(e) {
      // Si el CRM no responde, mostramos éxito igualmente (no bloquear al usuario)
      // pero podríamos loguearlo o reintentar
      console.error('CRM error:', e);
      setSent(true);
    } finally {
      setLoading(false);
    }
  };

  const upd = (k) => (e) => setForm(f => ({...f, [k]: e.target.value}));
  return(
    <section id="contacto" ref={rev.ref} style={{background:'var(--slate)',padding:isMobile?'3rem 1rem':'4.5rem 1.5rem',position:'relative',overflow:'hidden'}}>

            Reserva tu<br/><em style={{fontStyle:'italic',color:'var(--mint)'}}>primera cita</em>
          </h2>
          <p style={{fontSize:'0.85rem',color:'rgba(240,245,247,0.78)',lineHeight:1.85,marginBottom:'2rem',maxWidth:'400px'}}>
            Primera visita de diagnóstico sin compromiso. Te explicamos el tratamiento y te damos presupuesto cerrado en el momento.
          </p>
          {[['📍','C/ Lehendakari Aguirre, 23\n48014 Deusto, Bilbao',''],
            ['📞','944 123 456','tel:+34944123456'],
            ['🕐','Lun–Vie 9:00–20:00 · Sáb 9:00–14:00',''],
            ['✉️','info@bigtooth.es','mailto:info@bigtooth.es']].map(([icon,val,href])=>(
            <div key={val} style={{display:'flex',gap:'0.75rem',marginBottom:'1rem',alignItems:'flex-start'}}>
              <span style={{width:30,height:30,background:'rgba(42,124,111,0.3)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',flexShrink:0,marginTop:'0.1rem'}}>{icon}</span>
              {href
                ?<a href={href} style={{fontSize:'0.85rem',color:'rgba(240,245,247,0.85)',lineHeight:1.65,paddingTop:'0.15rem',whiteSpace:'pre-line',textDecoration:'none',transition:'color 180ms'}}
                    onMouseEnter={e=>e.target.style.color='var(--mint)'}
                    onMouseLeave={e=>e.target.style.color='rgba(240,245,247,0.85)'}>{val}</a>
                :<span style={{fontSize:'0.85rem',color:'rgba(240,245,247,0.85)',lineHeight:1.65,paddingTop:'0.15rem',whiteSpace:'pre-line'}}>{val}</span>
              }
            </div>
          ))}
          <div style={{display:'inline-flex',alignItems:'center',gap:'6px',background:'rgba(42,124,111,0.18)',border:'1px solid rgba(168,213,204,0.3)',padding:'5px 12px',borderRadius:'2px',fontSize:'0.68rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--mint)',marginTop:'0.75rem'}}>
            🏴 Euskaraz artatzen dugu
          </div>
        </div>
        <div style={{...rev.anim(1),background:'var(--ice)',padding:'2rem',borderRadius:'0.5rem'}}>
          {sent?(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'320px',gap:'1rem',textAlign:'center'}}>
              <span style={{fontSize:'2.5rem'}}>🦷</span>
              <h3 style={{fontFamily:'Playfair Display,serif',fontSize:'1.4rem',fontWeight:700,color:'var(--slate)'}}>¡Cita solicitada!</h3>
              <p style={{fontSize:'0.85rem',color:'var(--muted)',lineHeight:1.7}}>Te llamamos en menos de 24h para confirmar tu cita.<br/>Hasta pronto en BigTooth.</p>
              <button onClick={()=>{setSent(false);setForm({nombre:'',telefono:'',email:'',tratamiento:'Implantes dentales',mensaje:''});}} className="btn-teal" style={{padding:'0.65rem 1.5rem',borderRadius:'2px',fontSize:'0.72rem',fontWeight:500,letterSpacing:'0.07em',textTransform:'uppercase',marginTop:'0.5rem'}}>Nueva consulta</button>
            </div>
          ):(
            <form onSubmit={handleSubmit}>
              <p style={{fontFamily:'Playfair Display,serif',fontSize:'1.15rem',fontWeight:500,color:'var(--slate)',marginBottom:'1.4rem'}}>Solicita tu cita</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.75rem',marginBottom:'0.75rem'}}>
                <div>
                  <label style={{display:'block',fontSize:'0.62rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:'0.35rem',fontWeight:500}}>Nombre *</label>
                  <input required type="text" placeholder="Tu nombre" value={form.nombre} onChange={upd('nombre')} disabled={loading}
                    style={{width:'100%',padding:'0.65rem 0.8rem',background:'var(--white)',border:'1px solid var(--border)',borderRadius:'2px',fontSize:'0.85rem',color:'var(--slate)',outline:'none',transition:'border 180ms'}}
                    onFocus={e=>e.target.style.borderColor='var(--teal)'}
                    onBlur={e=>e.target.style.borderColor='var(--border)'}/>
                </div>
                <div>
                  <label style={{display:'block',fontSize:'0.62rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:'0.35rem',fontWeight:500}}>Teléfono *</label>
                  <input required type="tel" placeholder="944 000 000" value={form.telefono} onChange={upd('telefono')} disabled={loading}
                    style={{width:'100%',padding:'0.65rem 0.8rem',background:'var(--white)',border:'1px solid var(--border)',borderRadius:'2px',fontSize:'0.85rem',color:'var(--slate)',outline:'none',transition:'border 180ms'}}
                    onFocus={e=>e.target.style.borderColor='var(--teal)'}
                    onBlur={e=>e.target.style.borderColor='var(--border)'}/>
                </div>
              </div>
              <div style={{marginBottom:'0.75rem'}}>
                <label style={{display:'block',fontSize:'0.62rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:'0.35rem',fontWeight:500}}>Email</label>
                <input type="email" placeholder="correo@ejemplo.com" value={form.email} onChange={upd('email')} disabled={loading}
                  style={{width:'100%',padding:'0.65rem 0.8rem',background:'var(--white)',border:'1px solid var(--border)',borderRadius:'2px',fontSize:'0.85rem',color:'var(--slate)',outline:'none',transition:'border 180ms'}}
                  onFocus={e=>e.target.style.borderColor='var(--teal)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'}/>
              </div>
              <div style={{marginBottom:'0.75rem'}}>
                <label style={{display:'block',fontSize:'0.62rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:'0.35rem',fontWeight:500}}>Tratamiento de interés</label>
                <select value={form.tratamiento} onChange={upd('tratamiento')} disabled={loading}
                  style={{width:'100%',padding:'0.65rem 0.8rem',background:'var(--white)',border:'1px solid var(--border)',borderRadius:'2px',fontSize:'0.85rem',color:'var(--slate)',outline:'none'}}>
                  <option>Implantes dentales</option><option>Ortodoncia Invisalign</option><option>Blanqueamiento</option><option>Estética dental</option><option>Primera visita general</option>
                </select>
              </div>
              <div style={{marginBottom:'1.1rem'}}>
                <label style={{display:'block',fontSize:'0.62rem',letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginBottom:'0.35rem',fontWeight:500}}>Mensaje</label>
                <textarea placeholder="Cuéntanos brevemente qué necesitas..." rows="3" value={form.mensaje} onChange={upd('mensaje')} disabled={loading}
                  style={{width:'100%',padding:'0.65rem 0.8rem',background:'var(--white)',border:'1px solid var(--border)',borderRadius:'2px',fontSize:'0.85rem',color:'var(--slate)',outline:'none',resize:'vertical',transition:'border 180ms'}}
                  onFocus={e=>e.target.style.borderColor='var(--teal)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'}/>
              </div>
              {err && <p style={{fontSize:'0.75rem',color:'#A32D2D',marginBottom:'0.75rem'}}>{err}</p>}
              <button type="submit" disabled={loading} className="btn-slate" style={{width:'100%',padding:'0.85rem',borderRadius:'2px',fontSize:'0.75rem',fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',opacity:loading?0.6:1,cursor:loading?'wait':'pointer'}}>
                {loading ? 'Enviando...' : 'Reservar cita →'}
              </button>
            </form>
          )}
        </div>
      </div>
    </section>
  );
}

function Footer(){
  const sc=id=>e=>{e.preventDefault();document.getElementById(id)?.scrollIntoView({behavior:'smooth'});};
  return(
    <footer style={{background:'#0F1A22',padding:'2rem 1.5rem',borderTop:'1px solid rgba(168,213,204,0.08)'}}>
      <div style={{maxWidth:'1100px',margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'1rem'}}>
        <span style={{fontFamily:'Playfair Display,serif',fontSize:'1rem',fontWeight:700,color:'#FFFFFF'}}>Big<span style={{color:'var(--mint)'}}>Tooth</span></span>
        <div style={{display:'flex',gap:'1.5rem',flexWrap:'wrap'}}>
          {[['Servicios','sec-servicios'],['Nosotros','sec-nosotros'],['Testimonios','sec-testimonios'],['Contacto','contacto']].map(([l,id])=>(
            <a key={l} href="#" onClick={sc(id)} className="footer-link">{l}</a>
          ))}
        </div>
        <span style={{fontSize:'0.65rem',color:'rgba(247,250,251,0.4)',letterSpacing:'0.04em'}}>© 2025 BigTooth · Deusto, Bilbao</span>
      </div>
    </footer>
  );
}

function FAB(){
  const sc=e=>{e.preventDefault();document.getElementById('contacto')?.scrollIntoView({behavior:'smooth'});};
  return(
    <a href="#contacto" onClick={sc} title="Reservar cita" className="btn-teal" style={{position:'fixed',bottom:'1.5rem',right:'1.5rem',width:'52px',height:'52px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',zIndex:60,boxShadow:'0 4px 18px rgba(42,124,111,0.45)',textDecoration:'none'}}>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </a>
  );
}

function App(){
  const [splash,setSplash]=useState(true);
  return(
    <div style={{background:'var(--ice)',minHeight:'100%'}}>
      {splash&&<Splash onDone={()=>setSplash(false)}/>}
      <Navbar/><S1/><S2/><S3/><Testimonios/><Contacto/><Footer/><FAB/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
